<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="description" content="Login — Industrial, Commercial & Domestic Cleaning Solutions">
    <meta name="theme-color" content="#071021">
    <link rel="manifest" href="manifest.json">
    <title>Login — Industrial, Commercial & Domestic Cleaning Solutions</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="auth-wrap">
        <div class="auth-card">
            <div class="auth-head">
                <div>
                    <h1 class="auth-title">Customer Login</h1>
                    <p class="auth-subtitle">Access your portal to view invoices and requests.</p>
                </div>
                <a class="btn dark" href="index.html" style="padding:10px 12px;">Home</a>
            </div>

            <form id="login-form" class="form" method="post" action="#">
                <div class="field">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required placeholder="Enter your email">
                </div>
                <div class="field">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="Enter your password">
                </div>
                <div id="login-error" class="notice error" style="display:none;"></div>
                <button type="submit" class="btn primary" style="width:100%;">Login</button>
            </form>

            <div class="auth-actions">
                <p class="muted" style="margin:0;">Don’t have an account? <a class="link" href="register.html">Register</a></p>
                <p class="muted" style="margin:0;">Admin? <a class="link" href="admin-login.html">Sign in here</a></p>
            </div>
            <div class="auth-actions" style="margin-top: 10px;">
                <p class="muted" style="margin:0;"><a class="link" href="forgot-password.html">Forgot password?</a></p>
            </div>

            <div class="notice" style="margin-top:14px;">
                Tip: this demo stores accounts in your browser (localStorage).
            </div>
        </div>
    </div>
    <script src="auth.js" defer></script>
</body>

</html>
