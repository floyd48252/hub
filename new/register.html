<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="description" content="Register — Industrial, Commercial & Domestic Cleaning Solutions">
    <meta name="theme-color" content="#071021">
    <link rel="manifest" href="manifest.json">
    <title>Register — Industrial, Commercial & Domestic Cleaning Solutions</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="auth-wrap">
        <div class="auth-card">
            <div class="auth-head">
                <div>
                    <h1 class="auth-title">Create account</h1>
                    <p class="auth-subtitle">Register to submit requests and track invoices.</p>
                </div>
                <a class="btn dark" href="index.html" style="padding:10px 12px;">Home</a>
            </div>

            <form id="register-form" class="form" method="post" action="#">
                <div class="field">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required placeholder="your@email.com">
                </div>
                <div class="field">
                    <label for="first_name">First Name</label>
                    <input type="text" id="first_name" name="first_name" placeholder="John">
                </div>
                <div class="field">
                    <label for="last_name">Last Name</label>
                    <input type="text" id="last_name" name="last_name" placeholder="Doe">
                </div>
                <div class="field">
                    <label for="company_name">Company Name</label>
                    <input type="text" id="company_name" name="company_name" placeholder="Your Company">
                </div>
                <div class="field">
                    <label for="phone">Phone</label>
                    <input type="tel" id="phone" name="phone" placeholder="(555) 123-4567">
                </div>
                <div class="field">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required minlength="6" placeholder="At least 6 characters">
                </div>
                <div id="register-error" class="notice error" style="display:none;"></div>

                <button type="submit" class="btn primary" style="width:100%;">Create Account</button>
            </form>

            <div class="auth-actions">
                <p class="muted" style="margin:0;">Already have an account? <a class="link" href="login.html">Login</a></p>
                <p class="muted" style="margin:0;">Admin? <a class="link" href="admin-login.html">Admin Login</a></p>
            </div>
        </div>
    </div>
    <script src="auth.js" defer></script>
</body>

</html>
