<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="description" content="Reset admin password — Industrial, Commercial & Domestic Cleaning Solutions">
    <meta name="theme-color" content="#071021">
    <link rel="manifest" href="manifest.json">
    <title>Forgot Password - Admin</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="auth-wrap">
        <div class="auth-card">
            <div class="auth-head">
                <div>
                    <h1 class="auth-title">Reset admin password</h1>
                    <p class="auth-subtitle">Use the recovery code from Admin Dashboard → Admin Settings.</p>
                </div>
                <a class="btn dark" href="index.html" style="padding:10px 12px;">Home</a>
            </div>

            <div class="notice" style="margin: 6px 0 12px;">
                No backend email exists in this demo. Admin reset requires the <b>recovery code</b> stored in this browser.
            </div>

            <form id="admin-forgot-form" class="form" method="post" action="#">
                <div class="field">
                    <label for="email">Admin email</label>
                    <input type="email" id="email" name="email" required placeholder="admin@cleaning.com">
                </div>
                <div class="field">
                    <label for="recovery_code">Recovery code</label>
                    <input type="text" id="recovery_code" name="recovery_code" required placeholder="REC-XXXX-XXXX-XXXX-XXXX">
                </div>
                <div class="field">
                    <label for="new_password">New password</label>
                    <input type="password" id="new_password" name="new_password" required minlength="6" placeholder="At least 6 characters">
                </div>
                <div class="field">
                    <label for="confirm_password">Confirm new password</label>
                    <input type="password" id="confirm_password" name="confirm_password" required minlength="6" placeholder="Repeat password">
                </div>

                <div id="admin-forgot-notice" class="notice" style="display:none;"></div>
                <button type="submit" class="btn primary" style="width:100%;">Update admin password</button>
            </form>

            <div class="auth-actions">
                <p class="muted" style="margin:0;"><a class="link" href="admin-login.html">Back to admin login</a></p>
                <p class="muted" style="margin:0;"><a class="link" href="forgot-password.html">Customer reset</a></p>
            </div>
        </div>
    </div>
    <script src="auth.js" defer></script>
</body>
</html>
