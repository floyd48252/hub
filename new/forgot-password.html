<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="description" content="Reset your password — Industrial, Commercial & Domestic Cleaning Solutions">
    <meta name="theme-color" content="#071021">
    <link rel="manifest" href="manifest.json">
    <title>Forgot Password - Customer</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="auth-wrap">
        <div class="auth-card">
            <div class="auth-head">
                <div>
                    <h1 class="auth-title">Reset password</h1>
                    <p class="auth-subtitle">Customer account password reset (demo mode).</p>
                </div>
                <a class="btn dark" href="index.html" style="padding:10px 12px;">Home</a>
            </div>

            <div class="notice" style="margin: 6px 0 12px;">
                This demo has no email backend. To reduce accidental resets, enter your email plus your <b>company name</b> or <b>phone</b> (as registered).
            </div>

            <form id="forgot-form" class="form" method="post" action="#">
                <div class="field">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required placeholder="you@example.com">
                </div>
                <div class="field">
                    <label for="company_or_phone">Company name or phone (verification)</label>
                    <input type="text" id="company_or_phone" name="company_or_phone" placeholder="e.g. Acme Ltd or (555) 123-4567">
                </div>
                <div class="field">
                    <label for="new_password">New password</label>
                    <input type="password" id="new_password" name="new_password" required minlength="6" placeholder="At least 6 characters">
                </div>
                <div class="field">
                    <label for="confirm_password">Confirm new password</label>
                    <input type="password" id="confirm_password" name="confirm_password" required minlength="6" placeholder="Repeat password">
                </div>

                <div id="forgot-notice" class="notice" style="display:none;"></div>
                <button type="submit" class="btn primary" style="width:100%;">Update password</button>
            </form>

            <div class="auth-actions">
                <p class="muted" style="margin:0;"><a class="link" href="login.html">Back to login</a></p>
                <p class="muted" style="margin:0;">Admin? <a class="link" href="admin-forgot-password.html">Reset admin password</a></p>
            </div>
        </div>
    </div>
    <script src="auth.js" defer></script>
</body>
</html>
